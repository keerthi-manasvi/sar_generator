services:
  postgres:
    image: postgres:16
    container_name: sar-postgres
    environment:
      POSTGRES_USER: aml_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sar_db
    ports:
      - "5432:5432"
    networks:
      - sar-network

  qdrant:
    image: qdrant/qdrant
    container_name: sar-qdrant
    ports:
      - "6333:6333"
    networks:
      - sar-network

  sar-app:
    build: .
    container_name: sar-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://aml_admin:password123@postgres:5432/sar_db
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - postgres
      - qdrant
    networks:
      - sar-network

networks:
  sar-network: